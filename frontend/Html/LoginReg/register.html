<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Register – Reddit 2</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="reddit2.css" />
	<script>
	(function(){var d={bg:'#1e1e2e',fg:'#cdd6f4',muted:'#6c7086',card:'#181825',border:'#313244'},l={bg:'#eff1f5',fg:'#4c4f69',muted:'#9ca0b0',card:'#e6e9ef',border:'#ccd0da'},t=localStorage.getItem('theme')==='light'?l:d,s=document.documentElement.style;s.setProperty('--bg',t.bg);s.setProperty('--fg',t.fg);s.setProperty('--muted',t.muted);s.setProperty('--card',t.card);s.setProperty('--border',t.border);})();
	</script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
	<div class="card auth-page-card p-4" style="width:100%;max-width:430px">
		<span class="auth-logo">Reddit 2</span>
		<span class="auth-subtitle">Create a free account</span>

		<div id="error-msg" class="alert alert-danger d-none"></div>
		<div id="success-msg" class="alert alert-success d-none"></div>

		<form id="register-form">
			<div class="mb-3">
				<label class="form-label" for="username">Username</label>
				<input id="username" type="text" class="form-control" placeholder="at least 3 characters" minlength="3" autocomplete="username" required />
			</div>

			<div class="mb-3">
				<label class="form-label" for="useremail">Email</label>
				<input id="useremail" type="email" class="form-control" placeholder="you@example.com" autocomplete="email" required />
			</div>

			<div class="mb-3">
				<label class="form-label" for="password">Password</label>
				<input id="password" type="password" class="form-control" placeholder="min 6 characters" minlength="6" autocomplete="new-password" required />
			</div>

			<div class="mb-3">
				<label class="form-label" for="confirm-password">Confirm password</label>
				<input id="confirm-password" type="password" class="form-control" placeholder="repeat password" minlength="6" autocomplete="new-password" required />
			</div>

			<button id="register-btn" type="submit" class="btn btn-primary w-100">Create account</button>
		</form>

		<p class="mt-3 text-center small">Already have an account? <a href="login.html">Log in</a></p>
	</div>

	<script type="module" src="register.js"></script>
</body>
</html>
