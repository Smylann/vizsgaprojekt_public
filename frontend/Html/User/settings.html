<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings – Reddit 2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous" />

  <link rel="stylesheet" href="reddit2.css" />

  <!-- Apply saved theme before first paint -->
  <script>
  (function(){var d={bg:'#1e1e2e',fg:'#cdd6f4',muted:'#6c7086',card:'#181825',border:'#313244',accent:'#cba6f7',accent2:'#89b4fa',overlay:'#313244'},l={bg:'#eff1f5',fg:'#4c4f69',muted:'#9ca0b0',card:'#e6e9ef',border:'#ccd0da',accent:'#8839ef',accent2:'#1e66f5',overlay:'#dce0e8'},t=localStorage.getItem('theme')==='light'?l:d,s=document.documentElement.style;s.setProperty('--bg',t.bg);s.setProperty('--fg',t.fg);s.setProperty('--muted',t.muted);s.setProperty('--card',t.card);s.setProperty('--border',t.border);s.setProperty('--accent',t.accent);s.setProperty('--accent2',t.accent2);s.setProperty('--overlay',t.overlay);})();
  </script>

  <style>
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
    }
    .settings-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .form-label { color: var(--fg); font-size: 0.9rem; }
    .form-control {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 8px;
    }
    .form-control:focus {
      background: var(--bg);
      color: var(--fg);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .form-control::placeholder { color: var(--muted); }
    .divider { border-color: var(--border); margin: 2rem 0; }
    .admin-link-card {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 15%, var(--card)), var(--card));
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .settings-toast {
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      color: #fff;
      font-size: 0.88rem;
      min-width: 200px;
      opacity: 1;
      transition: opacity 0.4s;
    }
    .settings-toast.success { background: #198754; }
    .settings-toast.danger  { background: #dc3545; }
    .pw-strength {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }
    .pw-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }
    .pw-strength-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }
  </style>
</head>

<body style="background:var(--bg);color:var(--fg);min-height:100vh">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container-fluid px-4 py-2">
      <a class="navbar-brand text-decoration-none me-3" href="index.html">Reddit 2</a>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <span id="navbar-username-top" class="text-muted small" data-show-when="authed" style="display:none"></span>
        <a class="btn btn-sm btn-outline-light" href="index.html">← Back</a>
        <button class="btn btn-sm btn-outline-light" id="logout-btn" type="button" data-show-when="authed" style="display:none">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 my-5">

    <!-- Loading -->
    <div id="settings-loading" class="text-center py-5">
      <div class="spinner-border" style="color:var(--accent)" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>

    <!-- Content (shown after auth check) -->
    <div id="settings-content" style="display:none">

      <div class="d-flex align-items-center gap-3 mb-4">
        <h2 class="mb-0" style="font-weight:800">⚙ Settings</h2>
        <span class="text-muted small">Logged in as <strong id="settings-username"></strong></span>
      </div>

      <!-- Admin Panel access card (admin only) -->
      <div id="admin-access-card" class="admin-link-card mb-4" style="display:none">
        <div>
          <div style="font-weight:700;font-size:1rem">⚙ Admin Panel</div>
          <div style="color:var(--muted);font-size:0.85rem;margin-top:2px">Manage users, posts, comments and categories.</div>
        </div>
        <a href="admin.html" class="btn btn-primary btn-sm" style="white-space:nowrap">Open Admin Panel →</a>
      </div>

      <!-- Change Password -->
      <div class="settings-card">
        <div class="settings-section-title">🔑 Change Password</div>
        <form id="change-pw-form" novalidate>
          <div class="mb-3">
            <label for="current-pw" class="form-label">Current Password</label>
            <input type="password" id="current-pw" class="form-control" placeholder="Enter your current password" autocomplete="current-password" />
          </div>
          <div class="mb-1">
            <label for="new-pw" class="form-label">New Password</label>
            <input type="password" id="new-pw" class="form-control" placeholder="Enter new password" autocomplete="new-password" />
            <div class="pw-strength"><div class="pw-strength-bar" id="pw-strength-bar"></div></div>
            <div class="pw-strength-label" id="pw-strength-label"></div>
          </div>
          <div class="mb-3">
            <label for="confirm-pw" class="form-label">Confirm New Password</label>
            <input type="password" id="confirm-pw" class="form-control" placeholder="Repeat new password" autocomplete="new-password" />
            <div id="confirm-pw-error" class="text-danger" style="font-size:0.8rem;margin-top:4px;display:none"></div>
          </div>
          <div id="pw-form-error"   class="text-danger mb-2"   style="font-size:0.85rem;display:none"></div>
          <div id="pw-form-success" class="text-success mb-2"  style="font-size:0.85rem;display:none"></div>
          <button type="submit" id="pw-submit-btn" class="btn btn-primary w-100">Save New Password</button>
        </form>
      </div>

    </div><!-- /settings-content -->
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
  <script type="module" src="settings.js"></script>
</body>
</html>
